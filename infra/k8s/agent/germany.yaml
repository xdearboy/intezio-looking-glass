apiVersion: v1
kind: Secret
metadata:
  name: agent-secret-germany
type: Opaque
stringData:
  AGENT_SECRET: "<YOUR_GERMANY_AGENT_SECRET_BASE64>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-germany
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-germany
  template:
    metadata:
      labels:
        app: agent-germany
    spec:
      nodeSelector:
        kubernetes.io/hostname: "<YOUR_GERMANY_NODE_HOSTNAME>"
      hostNetwork: true
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: agent
          image: ghcr.io/xdearboy/node-agent:latest
          ports:
            - containerPort: 8080
          env:
            - name: AGENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agent-secret-germany
                  key: AGENT_SECRET
            - name: AGENT_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-germany
spec:
  type: ClusterIP
  selector:
    app: agent-germany
  ports:
    - port: 8080
      targetPort: 8080
