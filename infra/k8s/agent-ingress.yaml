apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-germany-public
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    haproxy.org/timeout-tunnel: "3600s"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - lg-de.your-domain.com
      secretName: agent-germany-tls
  rules:
    - host: lg-de.your-domain.com
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: agent-germany
                port:
                  number: 8080
          - path: /testfile
            pathType: Prefix
            backend:
              service:
                name: agent-germany
                port:
                  number: 8080
---
