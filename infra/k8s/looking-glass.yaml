apiVersion: apps/v1
kind: Deployment
metadata:
  name: looking-glass
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: looking-glass
  template:
    metadata:
      labels:
        app: looking-glass
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: looking-glass
          image: ghcr.io/xdearboy/looking-glass:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 1000m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: looking-glass
spec:
  type: ClusterIP
  selector:
    app: looking-glass
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: looking-glass
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    haproxy.org/timeout-tunnel: "3600s"
    haproxy.org/response-set-header: "X-Accel-Buffering no"
    haproxy.org/forwarded-for: "true"
    haproxy.org/src-ip-header: "x-forwarded-for"
    haproxy.org/compression-algo: "gzip"
    haproxy.org/compression-type: "text/html text/plain text/css application/javascript application/json"
    haproxy.org/timeout-client: "30s"
    haproxy.org/timeout-server: "30s"
    haproxy.org/maxconn: "50000"
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - lg.your-domain.com
      secretName: looking-glass-tls
  rules:
    - host: lg.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: looking-glass
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: looking-glass-static
  annotations:
    haproxy.org/response-set-header: "Cache-Control public, max-age=31536000, immutable"
spec:
  ingressClassName: haproxy
  rules:
    - host: lg.your-domain.com
      http:
        paths:
          - path: /assets/
            pathType: Prefix
            backend:
              service:
                name: looking-glass
                port:
                  number: 80
          - path: /fonts/
            pathType: Prefix
            backend:
              service:
                name: looking-glass
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: looking-glass-client-ip
  annotations:
    haproxy.org/response-set-header: "Cache-Control public, max-age=60"
spec:
  ingressClassName: haproxy
  rules:
    - host: lg.your-domain.com
      http:
        paths:
          - path: /api/client-ip
            pathType: Exact
            backend:
              service:
                name: looking-glass-proxy
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: looking-glass-execute
  annotations:
    haproxy.org/timeout-tunnel: "3600s"
    haproxy.org/forwarded-for: "true"
    haproxy.org/src-ip-header: "x-forwarded-for"
spec:
  ingressClassName: haproxy
  rules:
    - host: lg.your-domain.com
      http:
        paths:
          - path: /api/execute
            pathType: Exact
            backend:
              service:
                name: looking-glass
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: looking-glass-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: looking-glass
  minReplicas: 4
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
