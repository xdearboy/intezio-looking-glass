apiVersion: v1
kind: Secret
metadata:
  name: looking-glass-secret
type: Opaque
stringData:
  NODES_CONFIG: |
    [
      {
        "id": "de",
        "name": "Germany",
        "url": "http://agent-germany:8080",
        "secret": "<YOUR_DE_NODE_SECRET_BASE64>"
      },
      {
        "id": "ee",
        "name": "Estonia",
        "url": "http://agent-estonia:8080",
        "secret": "<YOUR_EE_NODE_SECRET_BASE64>"
      },
      {
        "id": "nl",
        "name": "Netherlands",
        "url": "http://agent-netherlands:8080",
        "secret": "<YOUR_NL_NODE_SECRET_BASE64>"
      },
      {
        "id": "pl",
        "name": "Poland",
        "url": "http://agent-poland:8080",
        "secret": "<YOUR_PL_NODE_SECRET_BASE64>"
      }
    ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: looking-glass-proxy
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: looking-glass-proxy
  template:
    metadata:
      labels:
        app: looking-glass-proxy
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: proxy
          image: ghcr.io/xdearboy/looking-glass-proxy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NODES_CONFIG
              valueFrom:
                secretKeyRef:
                  name: looking-glass-secret
                  key: NODES_CONFIG
          resources:
            limits:
              cpu: 1000m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /api/client-ip
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/client-ip
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: looking-glass-proxy
spec:
  type: ClusterIP
  selector:
    app: looking-glass-proxy
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: looking-glass-proxy-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: looking-glass-proxy
  minReplicas: 4
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
